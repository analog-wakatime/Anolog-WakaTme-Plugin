name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Build VSIX package
        run: npm run package

      - name: Detect VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls ./*.vsix | sed -n '1p')
          echo "file=${VSIX_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true

      - name: Publish extension to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
