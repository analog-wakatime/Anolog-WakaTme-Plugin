name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: "Publish to VS Code Marketplace (requires VSCE_PAT)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js (with npm cache)
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Node.js (without cache)
        if: ${{ hashFiles('package-lock.json') == '' }}
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Build VSIX package
        run: npm run package

      - name: Detect VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls ./*.vsix | sed -n '1p')
          echo "file=${VSIX_FILE}" >> "$GITHUB_OUTPUT"

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true

      - name: Publish extension to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_marketplace)) }}
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
