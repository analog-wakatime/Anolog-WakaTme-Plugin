name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - Release
  workflow_dispatch:
    inputs:
      publish_marketplace:
        description: "Publish to VS Code Marketplace (requires VSCE_PAT)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

  release:
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Build VSIX package
        run: npm run package

      - name: Generate release checksum
        run: sha256sum ./*.vsix > vsix.sha256

      - name: Detect VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls ./*.vsix | sed -n '1p')
          echo "file=${VSIX_FILE}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists on current commit
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists locally."
          else
            git tag "$TAG_NAME" "$GITHUB_SHA"
          fi
          git push origin "$TAG_NAME" || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            ${{ steps.vsix.outputs.file }}
            vsix.sha256
          generate_release_notes: true

      - name: Publish extension to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_marketplace)) }}
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
