name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Build VSIX package
        run: npm run package

      - name: Read extension version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Detect VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls ./*.vsix | sed -n '1p')
          echo "file=${VSIX_FILE}" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists
        run: |
          TAG_NAME="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "${TAG_NAME}$"; then
            echo "Tag ${TAG_NAME} already exists in remote."
          else
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true

      - name: Publish extension to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
