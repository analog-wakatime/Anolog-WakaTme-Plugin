name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - Release
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-quality-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Upload test and build metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-metadata-node-24-${{ github.run_number }}
          path: |
            package.json
            package-lock.json
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ci-security-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run npm audit (high severity report)
        continue-on-error: true
        run: npm audit --audit-level=high --json > audit-report.json

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-${{ github.run_number }}
          path: audit-report.json
          if-no-files-found: ignore
          retention-days: 14

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: [quality, security]
    timeout-minutes: 15
    concurrency:
      group: ci-package-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Build VSIX package
        run: npm run package

      - name: Generate VSIX checksum
        run: sha256sum ./*.vsix > vsix.sha256

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: analog-wakatime-vsix-${{ github.run_number }}
          path: |
            *.vsix
            vsix.sha256
          if-no-files-found: error
          retention-days: 14
