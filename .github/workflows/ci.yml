name: CI

on:
  push:
    branches:
      - main
      - Release
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    concurrency:
      group: ci-quality-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js (with npm cache)
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Node.js (without cache)
        if: ${{ hashFiles('package-lock.json') == '' }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    concurrency:
      group: ci-package-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js (with npm cache)
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Node.js (without cache)
        if: ${{ hashFiles('package-lock.json') == '' }}
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Build VSIX package
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: analog-wakatime-vsix-${{ github.run_number }}
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 14
